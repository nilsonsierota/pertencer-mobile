name: CI/CD

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        
      - name: Run TypeScript check
        run: npx tsc --noEmit
        
      - name: Run tests
        run: npm test -- --passWithNoTests
        
  build-ios:
    runs-on: macos-latest
    needs: test
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        
      - name: Setup CocoaPods
        run: cd ios && pod install && cd ..
        
      - name: Build iOS
        run: npx expo run:ios --configuration Release --no-build-cache
        env:
          EXPO_NO_TELEMETRY: 1
          EXPO_USE_NDK_IOS: 1
          
  build-android:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        
      - name: Build Android
        run: npx expo run:android --variant release
        env:
          EXPO_NO_TELEMETRY: 1

  deploy:
    runs-on: ubuntu-latest
    needs: [build-ios, build-android]
    if: github.ref == 'refs/heads/master'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download iOS artifact
        uses: actions/download-artifact@v4
        with:
          name: ios-build
          
      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: android-build